metadata:
  version: '1'
  dependencies:
    apps:
    - id: dynatrace.azure.connector
      version: ^2.1.13
    - id: dynatrace.ownership
      version: ^2.3.1
  inputs: []
workflow:
  title: Import Microsoft Entra ID groups as Ownership teams
  description: ''
  schemaVersion: 4
  trigger: {}
  result: null
  type: STANDARD
  input: {}
  hourlyExecutionLimit: 1000
  guide: "# Import Microsoft Entra ID groups as Ownership teams\n\nThis workflow fetches\
    \ Microsoft Entra ID groups and imports them into Dynatrace.\n\n# Setup\n\n1.\
    \ **Set up Microsoft Entra ID Connector**\\\n     If you have not already you\
    \ need to [set up a connection](/ui/apps/dynatrace.settings/settings/dynatrace.azure.connector)\
    \ with Microsoft Azure. Learn more about [Microsoft Entra ID setup](https://dt-url.net/c862ez4)\
    \ in the official Dynatrace documentation.\n1. **Set up Ownership**\\\n     When\
    \ importing teams with Ownership \"Import teams\" action there is no additional\
    \ setup required. To learn more about [supported methods of applying ownership](https://dt-url.net/ws0243t)\
    \ please visit the official Dynatrace documentation.\n\n# Trigger Configuration\n\
    \nBy default, this workflow uses an on-demand [trigger](?trigger=).\nYou can leave\
    \ it as-is to trigger the workflow manually or via API.\nYou can update the trigger\
    \ to run on a schedule (for example, daily or weekly at a specific time).\n\n\
    # Get Entra ID groups\n\n1. **Customize filter criteria** for [get_entra_id_groups](?task=get_entra_id_groups)\
    \ (Optional)\\\n     Feel free to filter groups to be fetched from Microsoft Entra\
    \ ID.\n1. **Verify `$select` statement** for [get_entra_id_groups](?task=get_entra_id_groups)\\\
    \n     Ensure at least `id` and `displayName` are included. These fields are required\
    \ when importing Entra ID groups as ownership teams.\n\n# Import teams\n\n**Customize\
    \ import preferences** for [import_ownership_teams](?task=import_ownership_teams)\
    \ (Optional)\\\nDepending on your use case you can configure whether you only\
    \ want to import new teams and skip existing teams (default) or if you want to\
    \ overwrite existing teams.\\\nFurthermore you can decide whether you want to\
    \ fail action and do not import a single team or if you want to continue action\
    \ and import valid teams while logging the errors (default).\n\n# Customization\
    \ Examples\n\nIn some cases you may only want to import certain groups as ownership\
    \ teams. If out-of-the-box filter capabilities provided by Entra ID are not enough\
    \ you can always use a \"Run JavaScript\" action and manually preprocess your\
    \ groups. For example:\n\n```js\nimport { result } from '@dynatrace-sdk/automation-utils';\n\
    \nexport default async function () {\n  const getEntraIdGroupsResult = await result('get_entra_id_groups');\n\
    \  const groups = getEntraIdGroupsResult.groups;\n  const filteredGroups = groups.filter((group)\
    \ => group.mailEnabled);\n\n  return {\n    ...getEntraIdGroupsResult,\n    count:\
    \ filteredGroups.length,\n    groups: filteredGroups,\n  };\n}\n```\n\n# Next\
    \ steps\n\n* Turn on notifications \U0001F514 to be notified about workflow failures\
    \ via email.\n* Once the workflow has run you should see imported teams when navigating\
    \ to **Settings > Environment segmentation > Ownership > Teams**.\n* Create a\
    \ separate workflow triggered by a problem and get owners for affected entities.\
    \ Use contact details to notify responsible teams about the problem.\n\n# Learn\
    \ more\n\n* [Microsoft Entra ID Connector](https://dt-url.net/c862ez4)\n* [Ownership](https://dt-url.net/ih0266u)"
  tasks:
    get_entra_id_groups:
      name: get_entra_id_groups
      input:
        top: '999'
        count: 'true'
        expand: ''
        filter: ''
        search: ''
        select: id,displayName,description,mail,mailNickname
        orderby: ''
        connection: ''
      action: dynatrace.azure.connector:get-groups
      position:
        x: 0
        y: 1
      description: Fetch your groups from Microsoft Entra ID
      predecessors: []
    import_ownership_teams:
      name: import_ownership_teams
      input:
        importData: '{{ result("get_entra_id_groups") }}'
        importType: IMPORT_ONLY
        failStrategy: CONTINUE_AND_LOG_FAILURE
        importSource: Entra ID groups
      action: dynatrace.ownership:import-teams-to-settings
      active: true
      position:
        x: 0
        y: 2
      conditions:
        states:
          get_entra_id_groups: OK
      description: Import teams into Dynatrace.
      predecessors:
      - get_entra_id_groups
