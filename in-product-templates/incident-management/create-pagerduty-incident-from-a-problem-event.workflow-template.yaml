metadata:
  version: '1'
  dependencies:
    apps:
    - id: dynatrace.pagerduty
      version: ^2.1.1
  inputs: []
workflow:
  title: Create PagerDuty incident from a Problem Event
  description: This workflow creates a PagerDuty incident using the occurrence and
    information from a Problem Event. The data from the problem is used to define
    the payload for the incident.
  schemaVersion: 4
  trigger: {}
  type: SIMPLE
  input: {}
  hourlyExecutionLimit: 1000
  guide: "# Setup\n\n1. **Configure PagerDuty connection**\n  - Open the task [create_pagerduty_incident](?task=create_pagerduty_incident&tab=input)\n\
    \  - Select your PagerDuty connection\n  - If you don't have a connection yet,\
    \ go to **Settings** > **Connections** > [PagerDuty](/ui/apps/dynatrace.settings/settings/dynatrace.pagerduty)\
    \ to create one\n\n# Trigger\n\nBy default, this workflow uses an on-demand [trigger](?trigger=).\
    \ You can leave it as-is to trigger the workflow manually or via API.\n\nTo automate\
    \ incident creation, update the trigger to use a problem event trigger. This will\
    \ automatically create PagerDuty incidents when Dynatrace detects problems."
  tasks:
    create_pagerduty_incident:
      name: create_pagerduty_incident
      input:
        from: no.reply@example.com
        title: '{{ event.event.title }}'
        details: '{{ event.event.description }}'
        serviceId: '{{ event.event.entity }}'
        incidentKey: DT_{{ event()["event.id"] }}
        connectionId: ''
      action: dynatrace.pagerduty:create-incident
      position:
        x: 0
        y: 1
      description: Creates an incident for a service.
      predecessors: []
