metadata:
  version: '1'
  dependencies:
    apps:
    - id: dynatrace.automations
      version: ^1.2879.1
    - id: dynatrace.davis.copilot.workflow.actions
      version: ^1.3.2-preview.0.1
    - id: dynatrace.email
      version: ^1.9.0
    - id: dynatrace.slack
      version: ^3.4.0
  inputs:
  - type: connection
    schema: app:dynatrace.slack:connection
    targets:
    - tasks.notify-in-slack.connection
workflow:
  title: Security Association Agent
  description: ''
  schemaVersion: 4
  trigger:
    eventTrigger:
      isActive: false
      triggerConfiguration:
        type: davis-problem
        value:
          categories:
            resource: true
            slowdown: true
            availability: true
          entityTags: {}
          customFilter: event.status_transition == "CREATED"
          onProblemClose: false
          entityTagsMatch: all
          analysisReady: false
  result: null
  type: STANDARD
  input:
    ai-score.threshold: 69
  hourlyExecutionLimit: 10
  guide: '# Security Association Agent


    Prioritize Davis problems with security context. This workflow analyzes the relationship
    between problems and their related entities, and various detected security findings
    on the corresponding entities.


    # Prerequisites


    * Dynatrace-native security capabilities for vulnerability, compliance, and attack
    detection are enabled.

    * Or, a supported [third-party security integration](https://docs.dynatrace.com/docs/shortlink/security-events-ingest)
    is set up and ingests security findings into Dynatrace.


    # How to Setup


    1. During the template deployment select an existing Slack connection or create
    a new one.

    2. After the workflow deployment:

    * Configure the recipient email in the [`notify-in-email`](?task=notify-in-email&tab=input)
    task.

    * Select the desired Slack channel in the [`notify-in-slack`](?task=notify-in-slack&tab=input)
    task.

    * Set the desired `ai-score.threshold` in the [Workflow options](?options=) `Default
    input`. It will be used as the threshold for notifications (no notifications will
    be sent if the score is below this threshold). Default: `70` (out of max `100`).

    4. Enable the workflow trigger.


    # Workflow flow


    1. Workflow starts when a new Davis problem of `Resource`, `Slowdown` or `Availability`
    type is detected.

    2. Related entities of the problem are extracted, and security queries are contsructed.

    3. Vulnerability, detection and compliance findings are queried.

    4. The workflow summarizes the findings, analizes the probability of the problems
    to be caused due to security issues, and generates a association score.

    5. If the notification threshold (set previously) exceeded, the relevant stakeholders
    are being notified in a Slack notification and an email.'
  tasks:
    notify-in-email:
      name: notify-in-email
      input:
        cc: []
        to: []
        bcc: []
        content: '{{ (result("summarize-analysis").text | replace("\n","\\n") | from_json)["summary"]
          | replace("\\n","\n")}}'
        subject: An observability problem "{{event()["event.name"] }}" has been detected
          with {{(result("summarize-analysis").text | replace("\n","\\n") | from_json)["score"]}}%
          probability to be caused by security findings.
      action: dynatrace.email:send-email
      active: true
      position:
        x: 1
        y: 4
      conditions:
        custom: '{{(result("summarize-analysis").text | replace("\n","\\n") | from_json)["score"]
          | int > input()["ai-score.threshold"]}}'
        states:
          summarize-analysis: OK
      description: Send email
      predecessors:
      - summarize-analysis
    notify-in-slack:
      name: notify-in-slack
      input:
        channel: C09UVT2K7JN
        message: An observability problem "{{event()["event.name"] }}" has been detected
          with {{(result("summarize-analysis").text | replace("\n","\\n") | from_json)["score"]}}%
          probability to be caused by security findings.
        reaction: []
        attachment:
          type: markdown
          title: Attachment
          content: '{{ (result("summarize-analysis").text | replace("\n","\\n") |
            from_json)["summary"] | replace("\\n","\n")}}'
          initialComment: ''
        connection: ''
        workflowID: '{{ execution().workflow.id }}'
        channelType: id
        executionID: '{{ execution().id }}'
        executionDate: '{{ execution().started_at }}'
        appendToThread: false
        replyBroadcast: false
        selectedRequestType: 2
        attachmentToggleValue: file
      action: dynatrace.slack:slack-send-message
      active: true
      position:
        x: -1
        y: 4
      conditions:
        custom: '{{(result("summarize-analysis").text | replace("\n","\\n") | from_json)["score"]
          | int > input()["ai-score.threshold"]}}'
        states:
          summarize-analysis: OK
      description: Send a message to a Slack workspace
      predecessors:
      - summarize-analysis
    summarize-analysis:
      name: summarize-analysis
      input:
        config: disabled
        prompt: "You are given a Dynatrace Problem event and related security findings\
          \ (vulnerabilities, detection alerts, compliance findings) in the input\
          \ context. Your task is to analyze and summarize security risks related\
          \ to the Problem and calculate an AI-association score (0–100%) representing\
          \ the probability that security findings contributed to the Problem.\n\n\
          ### Input placeholders (use exactly as provided):\n\n* Problem identifier:\
          \ {{ event()[\"display_id\"] if \"display_id\" in event() else event()[\"\
          displayId\"] }}\n* Problem link: {{environment().url}}/ui/apps/dynatrace.davis.problems/problem/{{event()[\"\
          event.id\"]}}\n* Detection findings: from the context - Detection finding\
          \ summary.\n* Vulnerability findings: from the context - Vulnerability finding\
          \ summary. \n* Compliance findings: from the context - Compliance finding\
          \ summary. \n\n### Primary goals\n\n1. Produce a clear, structured Markdown\
          \ summary describing the problem, findings, relationships, and conclusions.\n\
          2. Compute a single AI-association score (0–100) representing the assessed\
          \ probability that the security findings contributed to the Davis problem.\
          \ Start the summary with the score and an explanation of how you derived\
          \ it.\n3. Output only a single-line JSON object with exactly two fields:\
          \ { \"summary\": \"<markdown summary escaped as a single-line JSON string>\"\
          , \"score\": \"<0-100>\" }\n\n### Analysis guidance (use these rules to\
          \ compute the AI-association score and reasoning)\n\n* If no evidences from\
          \ none of the type exist the association score should be 0%.\n* Consider\
          \ detection findings strongest indicator; vulnerabilities and compliance\
          \ weaker unless accompanied by detections.\n* If vulnerabilities exist but\
          \ no detections or compliance, the score should be lower than when detections\
          \ exist.\n* If compliance findings exist but no detections or vulnerabilities,\
          \ keep score ≤ 50%.\n* Any detection present → minimum suggested score 70%.\n\
          * Multiple detections → raise score > 80%.\n* If detection timestamps overlap\
          \ the problem timeframe (compare dt.davis.last_reopen_timestamp or event.time),\
          \ increase the score.\n* If there is no relationship between findings and\
          \ the problem, report that and use a lower score.\n* Adjust (fine-tune)\
          \ score by severity/risk of findings and by how closely affected entities\
          \ match the problem entities (IDs, host names, k8s fields).\n* Explicitly\
          \ mention timestamps and compare them against problem timestamps.\n* Where\
          \ applicable, explain whether a vulnerability or misconfiguration could\
          \ have led to the detection.\n\n\n### Required content and structure (Markdown)\n\
          \n1. Header: AI-association score (0–100%) and brief explanation of score\
          \ calculation.\n2. Problem summary:\n* Problem name and link (use the template\
          \ above).\n* Problem timestamps (ISO format).\n* All known affected entities\
          \ (full names and IDs where available). For each entity, include a clickable\
          \ entity link when possible (see Entity links below).\n3. Findings summary:\
          \ separate sections for\n* Vulnerabilities\n* Detection findings\n* Compliance\
          \ findings\n\nFor each finding type:\n* Number of new findings by risk (critical,\
          \ high, medium, low).\n* Number of affected entities per risk.\n* Link to\
          \ Dynatrace Notebooks intent that lists these findings: {{environment().url}}/ui/intent/dynatrace.notebooks/view-query#{\"\
          dt.query\":\"<query>\"} — URL must be URL-encoded as a single line string.\n\
          * Top 5 findings: for each provide:\n-- Name\n-- Risk level\n-- Provider\n\
          -- Number of affected entities + number of affected objects (if no entities)\n\
          -- Top 5 affected entities (format: name (ID)) or affected objects if entities\
          \ absent\n* Contribution assessment for this finding type to the Problem\
          \ (Low / Med / High) and a percentage (with reasoning).\n\n4. Entity-focused\
          \ summaries:\n* Table of top 5 affected entities with columns: entity name\
          \ (ID), total vulnerability findings, total detection findings, total compliance\
          \ findings (numbers).\n* Table of top 10 affected entities for critical/high\
          \ risk counts across finding types.\n\n5. Cross-correlation & insights:\n\
          * Do detection findings align with vulnerabilities/misconfigurations? Could\
          \ a vulnerability/misconfiguration plausibly explain the detection? Provide\
          \ evidence (matching entity IDs, k8s fields, host names).\n* Highlight findings\
          \ that most likely contributed to the Problem (especially those with matching\
          \ entity IDs, k8s, or host fields).\n\n6. Conclusion: concise recommendation\
          \ and final AI-association score restated.\n\n### Entity links (construct\
          \ clickable links when you include an entity):\n\n* host → {{environment().url}}/ui/apps/dynatrace.infraops/explorer/Hosts?fullPageId=<host-id>\n\
          * kubernetes node → {{environment().url}}/ui/apps/dynatrace.kubernetes/smartscape/K8S_NODE?detailsId=<k8s-node-id>\n\
          * kubernetes cluster → {{environment().url}}/ui/apps/dynatrace.kubernetes/smartscape/K8S_CLUSTER?detailsId=<k8s-cluster-id>\n\
          * ec2 instance → {{environment().url}}/ui/apps/dynatrace.clouds/smartscape?perspective=health&detailsId=<aws-ec2-id>\n\
          * process group (instance) → {{environment().url}}/ui/apps/dynatrace.infraops/explorer/Processes?perspective=Health&fullPageId=<pg-instance-id>\n\
          Note: <host-id>,<k8s-node-id>, <k8s-cluster-id>, <aws-ec2-id>, <pg-instance-id>\
          \ are just placeholders, which need to be replaced with the proper entity\
          \ ID.\n\n### Formatting and technical rules\n\n* When listing entities mention\
          \ the full names and (if available) the ids of the entities. Template: `name\
          \ (id)`.\n* Output only a single-line JSON object and nothing else.\n* The\
          \ JSON must have exactly two fields: \"summary\" and \"score\".\n* The value\
          \ of \"summary\" must be a single markdown escaped string.\n* Use ISO timestamps\
          \ in the escaped Markdown.\n* Example of correct output (single line):\n\
          {\"summary\":\"# Problem\\nProblem details here.\\n- Item 1\\n- Item 2\"\
          ,\"score\":\"72\"}\n* The JSON must be the only output (no surrounding ```\
          \ or extra text). \n* Do not insert newlines inside the JSON; produce one\
          \ flat line.\n\n\n### Examples (how to build an encoded notebooks intent\
          \ link)\n\n* Query example (before encoding): {\"dt.query\":\"fetch dt.security.findings\
          \ | filter type = 'vulnerability'\"}\n* Query should be appended after:\
          \ {{environment().url}}/ui/intent/dynatrace.notebooks/view-query#"
        autoTrim: false
        instruction: ''
        supplementary: '

          ***************************

          Input Davis problem event:

          {{event()}}


          ****************************

          Vulnerability query:

          {{result("generate-vulnerability-query")}}


          Vulnerability finding summary:

          {{result("execute-vulnerabilities-query").records}}


          ***************************

          Compliance query:

          {{result("generate-compliance-query")}}


          Compliance finding summary:

          {{result("execute-compliance-query").records}}


          *****************************

          Detections query:

          {{result("generate-detections-query")}}


          Detection finding summary:

          {{result("execute-detections-query").records}}


          '
      retry:
        count: 2
        delay: 45
        failedLoopIterationsOnly: true
      action: dynatrace.davis.copilot.workflow.actions:davis-copilot
      active: true
      position:
        x: 0
        y: 3
      conditions:
        states:
          execute-compliance-query: OK
          execute-detections-query: OK
          execute-vulnerabilities-query: OK
      description: Prompt the Dynatrace Intelligence generative AI
      predecessors:
      - execute-compliance-query
      - execute-detections-query
      - execute-vulnerabilities-query
      customSampleResult:
        text: '{ "score": "85","summary": "### AI-Association Score: 85%

          The AI-association score is assessed at 85%, indicating a strong likelihood
          that the security findings contributed to the Davis problem (P-2601676).
          This is based on the presence of multiple detection findings within the
          timeframe of the problem, combined with critical vulnerabilities and compliance
          failures affecting the same entities.


          ### Problem Summary

          The Davis problem **P-2601676** is categorized as **CPU saturation** with
          99.72% CPU usage. It affects the host entity **ip-10-178-55-40.ec2.internal
          (HOST-2C9EA5900CEF6864)**, which is part of the Kubernetes cluster **fde74e4a-b1e1-41d7-b7ff-3a9b33e82985**.


          ### Findings Summary

          #### Vulnerabilities

          - **Critical:** 2 findings affecting 2 entities.

          - **High:** 1 finding affecting 8 entities.

          - **Medium:** 1 finding affecting 7 entities.

          - **Low:** 1 finding affecting 7 entities.

          - **None:** 1 finding affecting 1 entity.

          - **Intent URL:** [Vulnerability Findings](https://hau05752.sprint.apps.dynatracelabs.com/ui/intent/dynatrace.notebooks/view-query#%7B%22dt.query%22%3A%22fetch%20security.events%5Cn%7C%20filter%20event.type%3D%3D%5C%22VULNERABILITY_STATE_REPORT_EVENT%5C%22%5Cn%7C%20filter%20event.level%3D%3D%5C%22ENTITY%5C%22%5Cn%7C%20filter%20in%28dt.entity.host%2C%7B%5C%22HOST-2C9EA5900CEF6864%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28related_entities.hosts.ids%2C%7B%5C%22HOST-2C9EA5900CEF6864%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28related_entities.kubernetes_nodes.ids%2C%7B%5C%22KUBERNETES_NODE-A1FC336D84FB904D%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28related_entities.container_group_instances.ids%2C%7B%5C%22CONTAINER_GROUP_INSTANCE-BD0B4719CEAE9748%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28related_entities.services.ids%2C%7B%5C%22SERVICE-8A5087303379DBEA%5C%22%2C%20%5C%22SERVICE-971647E25F77F3DD%5C%22%2C%20%5C%22SERVICE-EC21CDC3560BB0B4%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28k8s.node.name%2C%20%7B%5C%22ip-10-178-55-40.ec2.internal%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28k8s.cluster.uid%2C%20%7B%5C%22fde74e4a-b1e1-41d7-b7ff-3a9b33e82985%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28host.name%2C%20%7B%5C%22ip-10-178-55-40.ec2.internal%5C%22%7D%29%5Cn%7C%20expand%20related_entities.kubernetes_clusters.id%3Drelated_entities.kubernetes_clusters.ids%5Cn%7C%20summarize%20by%3A%7BProvider%3Devent.provider%2C%20Risk%3Dvulnerability.risk.level%7D%2C%5Cn%7B%5Cn%20%20vulnerabilities%3DcollectDistinct%28vulnerability.title%29%2C%5Cn%20%20cves%3DarrayDistinct%28arrayFlatten%28collectDistinct%28vulnerability.references.cve%29%29%29%2C%5Cn%20%20affected_entities%3DcollectDistinct%28affected_entity.name%29%5Cn%7D%22%7D)


          #### Compliance Findings

          - **High:** 6 findings affecting 6 objects.

          - **Medium:** 15 findings affecting 15 objects.

          - **Low:** 2 findings affecting 2 objects.

          - **Intent URL:** [Compliance Findings](https://hau05752.sprint.apps.dynatracelabs.com/ui/intent/dynatrace.notebooks/view-query#%7B%22dt.query%22%3A%22fetch%20security.events%5Cn%7C%20filter%20event.type%3D%3D%5C%22COMPLIANCE_FINDING%5C%22%5Cn%20%20%20%20%20and%20compliance.result.status.level%20%3D%3D%20%5C%22FAILED%5C%22%5Cn%7C%20filter%20in%28dt.entity.host%2C%7B%5C%22HOST-2C9EA5900CEF6864%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28k8s.node.name%2C%20%7B%5C%22ip-10-178-55-40.ec2.internal%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28k8s.cluster.uid%2C%20%7B%5C%22fde74e4a-b1e1-41d7-b7ff-3a9b33e82985%5C%22%7D%29%5Cn%7C%20fieldsAdd%20finding.title%20%3D%20coalesce%28finding.title%2C%20compliance.rule.title%29%2C%5Cn%20%20%20%20%20%20%20%20%20%20%20%20Risk%3Dcoalesce%28dt.security.risk.level%2Ccompliance.rule.severity.level%29%5Cn%7C%20fieldsAdd%20Provider%3Dcoalesce%28event.provider%2C%20product.vendor%29%5Cn%7C%20summarize%20by%3A%7BProvider%2C%20Risk%7D%2C%5Cn%7B%5Cn%20%20detections%3DcollectDistinct%28finding.title%29%2C%5Cn%20%20affected_object.names%3DcollectDistinct%28object.id%29%2C%5Cn%20%20affected_object.types%3DcollectDistinct%28object.type%29%5Cn%7D%5Cn%7C%20fieldsAdd%20count%3DarraySize%28detections%29%22%7D)


          #### Detection Findings

          - **High:** 2 findings affecting 2 objects.

          - **Medium:** 1 finding affecting 1 object.

          - **Intent URL:** [Detection Findings](https://hau05752.sprint.apps.dynatracelabs.com/ui/intent/dynatrace.notebooks/view-query#%7B%22dt.query%22%3A%22fetch%20security.events%5Cn%7C%20filter%20event.type%3D%3D%5C%22DETECTION_FINDING%5C%22%5Cn%7C%20fieldsAdd%20finding.time.created%3DtoTimestamp%28finding.time.created%29%5Cn%7C%20filter%20finding.time.created%20%3E%20toTimestamp%28%5C%222026-01-26T09%3A10%3A12.762000000Z%5C%22%29%20-%202h%5Cn%7C%20filter%20in%28dt.entity.host%2C%7B%5C%22HOST-2C9EA5900CEF6864%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28k8s.cluster.uid%2C%7B%5C%22fde74e4a-b1e1-41d7-b7ff-3a9b33e82985%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28k8s.node.name%2C%7B%5C%22ip-10-178-55-40.ec2.internal%5C%22%7D%29%5Cn%20%20%20%20%20or%20in%28host.name%2C%7B%5C%22ip-10-178-55-40.ec2.internal%5C%22%7D%29%5Cn%7C%20summarize%20by%3A%7BProvider%3Devent.provider%2C%20Risk%3Ddt.security.risk.level%7D%2C%5Cn%7B%5Cn%20%20detections%3DcollectDistinct%28finding.title%29%2C%5Cn%20%20affected_object.names%3DcollectDistinct%28object.name%29%2C%5Cn%20%20affected_object.types%3DcollectDistinct%28object.type%29%5Cn%7D%5Cn%7C%20fieldsAdd%20count%3DarraySize%28detections%29%22%7D)


          ### Top 5 Affected Entities

          | Entity Name (ID) | Vulnerabilities | Compliance | Detections |

          |------------------|-----------------|------------|------------|

          | ip-10-178-55-40.ec2.internal (HOST-2C9EA5900CEF6864) | 5 | 23 | 3 |

          | Kubernetes cluster (fde74e4a-b1e1-41d7-b7ff-3a9b33e82985) | 4 | 15 | 2
          |

          | MembershipService.dll unguard-membership-service-* | 2 | 0 | 0 |

          | SpringBoot org.dynatrace.ssrfservice.Application unguard-proxy-service-*
          | 2 | 0 | 0 |

          | SpringBoot org.dynatrace.microblog.Application unguard-microblog-service-*
          | 2 | 0 | 0 |


          ### Top 5 Findings

          #### Vulnerabilities

          1. **SQL injection at MembershipController+<GetMembershipStatus>d__3.MoveNext()**
          (Critical) - Dynatrace - 2 entities.

          2. **Remote Code Execution (RCE)** (Critical) - Dynatrace - 2 entities.

          3. **Deserialization of Untrusted Data** (High) - Dynatrace - 8 entities.

          4. **Denial of Service (DoS)** (High) - Dynatrace - 8 entities.

          5. **Improper Input Validation** (Medium) - Dynatrace - 7 entities.


          #### Compliance

          1. **5.2.1 Prefer using dedicated EKS Service Accounts** (High) - Dynatrace
          - 6 objects.

          2. **4.4.1 Prefer using secrets as files over secrets as environment variables**
          (High) - Dynatrace - 6 objects.

          3. **4.3.2 Ensure that all Namespaces have Network Policies defined** (High)
          - Dynatrace - 6 objects.

          4. **4.1.4 Minimize access to create pods** (High) - Dynatrace - 6 objects.

          5. **4.1.5 Ensure that default service accounts are not actively used**
          (High) - Dynatrace - 6 objects.


          #### Detections

          1. **Trufflehog secret scanner executed** (High) - AutomationEngine - 1
          object.

          2. **Webserver executing reconnaissance commands** (High) - AutomationEngine
          - 1 object.

          3. **Kubernetes API new user agent by workload** (Medium) - AutomationEngine
          - 1 object.


          ### Contribution to Problem

          - **Vulnerabilities:** Medium contribution (~30%). Critical vulnerabilities
          such as SQL injection and RCE could lead to resource exhaustion.

          - **Compliance:** Medium contribution (~25%). Misconfigurations like excessive
          access to secrets and lack of network policies could exacerbate resource
          contention.

          - **Detections:** High contribution (~50%). Detection findings such as reconnaissance
          commands and secret scanning directly indicate potential malicious activity
          that could lead to CPU saturation.


          ### Conclusion

          The combination of critical vulnerabilities, compliance failures, and detection
          findings strongly suggests a security-related root cause for the CPU saturation
          problem. The detection findings, particularly those within the problem timeframe,
          are the strongest indicators of a direct connection to the issue."}'
    execute-compliance-query:
      name: execute-compliance-query
      input:
        query: '{{result("generate-compliance-query").text}}'
      action: dynatrace.automations:execute-dql-query
      position:
        x: -1
        y: 2
      conditions:
        states:
          generate-compliance-query: OK
      description: Make use of Dynatrace Grail data in your workflow.
      predecessors:
      - generate-compliance-query
    execute-detections-query:
      name: execute-detections-query
      input:
        query: '{{result("generate-detections-query").text}}'
      action: dynatrace.automations:execute-dql-query
      active: true
      position:
        x: 0
        y: 2
      conditions:
        states:
          generate-detections-query: OK
      description: Make use of Dynatrace Grail data in your workflow.
      predecessors:
      - generate-detections-query
    generate-compliance-query:
      name: generate-compliance-query
      input:
        config: dynatrace
        prompt: 'Take a sample detections DQL query from the context and replace the
          second filter section with filters for fields from the sample list of fields
          provided in the context, using only the the relevant fields that exist in
          the input event.

          For example, if dt.entity.kubernetes_cluster is a field in the input event,
          then the filter should be extended with OR in(dt.entity.kubernetes_cluster,{"KUBERNETES_CLUSTER-123",
          "KUBERNETES_CLUSTER-124"}), while "KUBERNETES_CLUSTER-123" and "KUBERNETES_CLUSTER-124"
          are the values extracted from the corresponding array in the event field:
          dt.entity.kubernetes_cluster.

          Another example, if k8s.cluster.uid is a field in the input Davis problem
          event, then the filter should be extended with OR in(k8s.cluster.uid,{"3ad2565e-ba50-4a8f-98e9-603d19931e74",
          "4ad2565e-ba50-4a8f-98e9-603d19931e74"}), while "3ad2565e-ba50-4a8f-98e9-603d19931e74"
          and "4ad2565e-ba50-4a8f-98e9-603d19931e74" are the values extracted from
          the corresponding array in the event field k8s.cluster.uid.

          Keep the query structure and the final summary command as in the sample
          query.


          IMPORTANT: Output only the final string of the query starting with "fetch"
          and ending with new line, without adding any other text to the output.

          DO NOT add ``` and the unknown or plaintext string to the output.'
        autoTrim: false
        instruction: ''
        supplementary: "**************************\nInput Davis problem event:\n**************************\n\
          {{event()}}\n\n**************************\nSample fields to filter by:\n\
