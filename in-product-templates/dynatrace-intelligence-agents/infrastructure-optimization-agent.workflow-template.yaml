      name: disk_overutilized
      input:
        query: "//over-utilized disks: 'max_disk_percent' > 95%\ntimeseries { \n \
          \ max_disk_percent = max(dt.host.disk.used.percent, scalar: true), \n  disk_size\
          \ = max(dt.host.disk.used, scalar: true),\n  p90_disk_percent = percentile(dt.host.disk.used.percent,\
