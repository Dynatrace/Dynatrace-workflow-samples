          \    if(p95_cpu_usage > p95_cpu_requests, \"INCREASE_REQUESTS\"),\n    if(p95_cpu_throttled\
          \ > 0 and p95_cpu_usage > 0.9 * p95_cpu_limits, \"INCREASE_LIMITS\"),\n\
          \    if(p95_cpu_throttled == 0 and p95_cpu_limits > 3 * p95_cpu_usage, \"\
          REDUCE_LIMITS\"),\n    \"NOMINAL\"\n  )\n| sort p95_cpu_requests desc\n\
