          \ 90, rollup:max, scalar: true), mem_p90 = percentile(dt.host.memory.usage,\
          \ 90, rollup:max, scalar: true) }, \n  union: TRUE, by: { dt.entity.host\
          \ }, from: now()-30d, to: now()\n| fieldsAdd dt.entity.host.name = entityName(dt.entity.host),\
          \ cpu_p90=round(cpu_p90), mem_p90=round(mem_p90)\n| fieldsAdd utilization=coalesce(\n\
          \  if(cpu_p90 < 10 and mem_p90 < 30, \"UNUSED\"),\n  if(cpu_p90 < 30 and\
          \ mem_p90 < 50, \"OVERPROVISIONED\"),\n  if(cpu_p90 > 80 and mem_p90 < 85,\
          \ \"UNDERPROVISIONED\"),\n  \"NOMINAL\"\n)\n| summarize {count=count(),\
          \ examples=collectArray(\n  record(dt.entity.host.name, dt.entity.host,\
          \ cpu_p90, mem_p90, cloudType=entityAttr(dt.entity.host,\"cloudType\"),\
          \ instanceType = coalesce(\n    if(entityAttr(dt.entity.host,\"cloudType\"\
          )==\"EC2\",entityAttr(dt.entity.host,\"additionalSystemInfo\")[system.model]),\n\
          \    entityAttr(dt.entity.host,\"azureVmSizeLabel\"),\n    entityAttr(dt.entity.host,\"\
          gceMachineType\")\n  ))\n,maxLength:5)}, by: {utilization}"
      action: dynatrace.automations:execute-dql-query
