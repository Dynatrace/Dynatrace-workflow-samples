    email_network_report:
      name: email_network_report
      input:
        cc:
        - '{{input()["emails"]["cc"]}}'
        to:
        - '{{input()["emails"]["to"]}}'
        bcc:
        - '{{input()["emails"]["bcc"]}}'
        content: 'AI generated report:

          {{result("network_report_prompt").text}}'
        subject: Network Optimization Report
      action: dynatrace.email:send-email
      position:
        x: 0
        y: 12
      conditions:
        else: SKIP
        custom: '{{input()["scope"]["network"]}}'
        states:
          network_report_prompt: OK
      description: Send email
      predecessors:
      - network_report_prompt
    network_report_prompt:
      name: network_report_prompt
      input:
        config: disabled
        prompt: 'Provide a markdown report for:

          ## Identify saturated interfaces

          Saturated interfaces could cause network slowdowns and require either upgrades
          or rerouting traffic.


          ## Identify up/down interfaces

          Network admininstrators refer to interfaces as "up/down", when the administrative
          status is "up" but the operational status is "down". Sometimes this is normal,
          e.g. a port for a user''s computer is down; however, many times this can
          also mean that a port that is intended to be up is for some reason down,
          perhaps due to a cable or NIC issue.'
        autoTrim: true
        instruction: ''
        supplementary: "{\n  \"Saturated interfaces\": {{result(\"network_saturated_interfaces\"\
          )[\"records\"]}},\n  \"Up/Down interfaces\": {{result(\"network_saturated_interfaces\"\
          )[\"records\"]}}\n}"
      retry:
        count: 2
        delay: 30
        failedLoopIterationsOnly: true
      action: dynatrace.davis.copilot.workflow.actions:davis-copilot
      position:
        x: 0
        y: 11
      conditions:
        else: SKIP
        custom: '{{input()["scope"]["network"]}}'
        states:
          network_updown_interfaces: OK
          network_saturated_interfaces: OK
      description: Prompt the Dynatrace Intelligence generative AI
      predecessors:
      - network_saturated_interfaces
      - network_updown_interfaces
    network_updown_interfaces:
      name: network_updown_interfaces
      input:
        query: '//list of up/down interfaces

          fetch `dt.entity.network:interface`

          |fieldsAdd parentDevice=runs_on[`dt.entity.network:device`], ifAdminStatus,
          ifOperStatus, type=if(isNull(if_type), type, else:if_type)

          |fields network_area=entityAttr(parentDevice,"extCfgGroupLabel",type:"dt.entity.network:device"),
          parentDeviceName=entityAttr(parentDevice,"entity.name",type:"dt.entity.network:device"),
          ifAdminStatus, ifOperStatus, type

          |filter ifAdminStatus == "up(1)" and ifOperStatus == "down(2)"'
      action: dynatrace.automations:execute-dql-query
      position:
        x: -1
        y: 10
      conditions:
        else: SKIP
        custom: '{{input()["scope"]["network"]}}'
        states:
          email_disk_report: OK
      description: Make use of Dynatrace Grail data in your workflow.
      predecessors:
      - email_disk_report
    network_saturated_interfaces:
      name: network_saturated_interfaces
      input:
        query: "//saturated interfaces: > 85% utilized\ntimeseries {\n    ifcBytesIn\
          \ =  sum(com.dynatrace.extension.network_device.if.bytes_in.count, default:\
          \ 0),\n    ifcBytesOut =  sum(com.dynatrace.extension.network_device.if.bytes_out.count,\
          \ default: 0)\n  },\n  filter: isNotNull(`dt.entity.network:interface`),\n\
          \  by:{ `dt.entity.network:device`, `dt.entity.network:interface`, if.speed},\
          \ union:true\n  | fieldsAdd\n    ifcBytesInSum=arraySum(ifcBytesIn),\n \
          \   ifcBytesOutSum=arraySum(ifcBytesOut),\n    ifSpeedInBytesPerMinute =\
          \ ((toDouble(if.speed) * 1000000)/8)*60\n  | fieldsAdd ifcSaturation = ((arrayAvg(ifcBytesIn)\
          \ + arrayAvg(ifcBytesOut))/(toDouble(interval) / 60000000000)) / ifSpeedInBytesPerMinute\n\
          \  | fieldsAdd lastBitsInOutPerSecond = (arrayAvg(ifcBytesIn)+arrayAvg(ifcBytesOut))*8/(toDouble(interval)/1000000000)\n\
          \  | fieldsAdd saturated=ifcSaturation >= 0.85\n  |filter saturated\n  |fields\
          \ network_area=entityAttr(`dt.entity.network:device`,\"extCfgGroupLabel\"\
          ),device=entityName(`dt.entity.network:device`), interface=entityName(`dt.entity.network:interface`),\
          \ ifcSaturation, lastBitsInOutPerSecond"
      action: dynatrace.automations:execute-dql-query
      position:
        x: 0
        y: 10
      conditions:
        else: SKIP
        custom: '{{input()["scope"]["network"]}}'
        states:
          email_disk_report: OK
      description: Make use of Dynatrace Grail data in your workflow.
      predecessors:
      - email_disk_report
