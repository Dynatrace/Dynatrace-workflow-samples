          \ 95, rollup:max, scalar: true),\n  p95_cpu_requests = percentile(dt.kubernetes.container.requests_cpu,\
          \ 95, rollup:max, scalar: true),\n  p95_cpu_limits = percentile(dt.kubernetes.container.limits_cpu,\
          \ 95, rollup:max, scalar: true)\n}, union: TRUE, by: { k8s.cluster.name,\
          \ k8s.workload.name, k8s.container.name },\nfrom: now()-7d, to: now()\n\
          | summarize by:{ k8s.cluster.name, k8s.workload.name}, {replicas=count(),\
          \ p95_cpu_limits = round(sum(p95_cpu_limits)), p95_cpu_requests=round(sum(p95_cpu_requests)),\
          \ p95_cpu_throttled=round(sum(p95_cpu_throttled)), p95_cpu_usage=round(sum(p95_cpu_usage))}\n\
