          \ nodes to save on cost\n3. Increase the size of under-provisioned nodes\
          \ to reduce risk\nUse the data provided in the context. Findings are already\
          \ provided for scale; however, still analyze the numbers and produce a recommendation\
          \ for each example cluster. For instance, you could recommend reducing the\
          \ number of nodes by 3 or scale down from a `m7a.2xlarge` to a `m7a.large`.\n\
          If possible, using the recommendations you generate and the instanceType\
          \ and cloudType, estimate potential cost savings.\n\n# Golden rules\n1.\
          \ Always show all of the provided findings in the context\n2. Always show\
          \ all metrics that were include in the context for each example\n3. Do not\
          \ skip examples and always indicate that they are just a small sample of\
          \ the total findings provided at the end of the email.\n4. Validate your\
          \ results, using the following method:\n  a. Generate your recommendations\n\
          \  b. Pass the recommendations back through LLM, asking it to test for reasonableness\n\
          \  c. If it rules that the recommendations are unreasonable, revise and\
          \ repeat\n  d. Repeat no more than 5 times\n5. Be sure to include the count\
          \ of similar findings from the context, when giving the sample recommendations."
