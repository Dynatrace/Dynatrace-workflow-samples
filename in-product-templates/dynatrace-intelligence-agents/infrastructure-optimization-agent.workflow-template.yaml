metadata:
  version: '1'
  dependencies:
    apps:
    - id: dynatrace.automations
      version: ^1.2879.1
    - id: dynatrace.davis.copilot.workflow.actions
      version: ^1.3.2-preview.0.1
    - id: dynatrace.email
      version: ^1.9.0
  inputs: []
workflow:
  title: Infrastructure Optimization Agent
  description: This agent generates infrastructure optmization reports and emails
    to the specified addresses.
  schemaVersion: 4
  trigger: {}
  result: null
  type: STANDARD
  input:
    scope:
      disk: true
      host: true
      network: false
      kubernetes: true
    emails:
      cc: []
      to:
      - me@email.com
      bcc: []
  hourlyExecutionLimit: 10
  guide: '# Infrastructure Optimization Agent

    Get recommendations on how to reduce cost and minimize risk by optimizing your
    infrastructure. This agent queries Grail and provides data to Dynatrace Assist
    to get recommendations. These recommendations are then sent to email(s) of your
    choice.


    # Setup

    1. Goto the [Workflow Input](?options=) and scroll down to `Workflow input and
    result`.

    2. Change `scope` to include or exclude desired scope. Note: if you are not monitoring
    some domains, e.g. `network`, please set to `false`.

    3. Change emails (`to`, `cc`, `bcc`) to be an array of strings, e.g.:

    ```

    "to": [ "me@email.com", "you@email.com"]

    ```

    4. Test with a manual Run, by click the `Run` button.

    5. If everything works as expected, change the [Trigger](?trigger=) to a schedule,
    e.g. Weekly, Daily, etc.



    # More advanced interactions

    Consider using our MCP server, [local](https://github.com/dynatrace-oss/dynatrace-mcp)
    or [remote](https://docs.dynatrace.com/docs/discover-dynatrace/platform/davis-ai/dynatrace-mcp
    ).'
  tasks:
    k8s_cluster_cpu:
      name: k8s_cluster_cpu
      input:
        query: "timeseries { \n  p95_cpu_allocatable = percentile(dt.kubernetes.node.cpu_allocatable,\
          \ 95, rollup:sum, scalar: true),\n  p95_cpu_usage = percentile(dt.kubernetes.container.cpu_usage,\
          \ 95, rollup:sum, scalar: true),\n  p95_cpu_limits = percentile(dt.kubernetes.container.limits_cpu,\
          \ 95, rollup:sum, scalar: true),\n  p95_cpu_requests = percentile(dt.kubernetes.container.requests_cpu,\
          \ 95, rollup:sum, scalar: true),\n  avg_node_count=avg(dt.kubernetes.nodes,\
          \ scalar: true)\n}, by: { k8s.cluster.name, k8s.cluster.uid }, from: now()-7d,\
          \ to:now()\n| lookup [\n  smartscapeNodes \"K8S_NODE\"\n  | parse k8s.object,\
          \ \"JSON:k8s.object\"\n  | fieldsAdd node.labels = `tags:k8s.labels`\n \
          \ | fields k8s.cluster.uid, instanceType=node.labels[`beta.kubernetes.io/instance-type`],\n\
          \  cloudType=substring(k8s.object[spec][providerID], to: indexOf(k8s.object[spec][providerID],\
          \ \":\"))\n], sourceField:k8s.cluster.uid, lookupField:k8s.cluster.uid,\
          \ fields:{cloudType, instanceType}\n\n| fieldsAdd finding=coalesce(\n  \
          \  if(p95_cpu_requests > 0.85 * p95_cpu_allocatable, \"SCALE_UP\"),\n  \
          \  if(p95_cpu_requests < 0.4 * p95_cpu_allocatable and p95_cpu_requests\
          \ / p95_cpu_allocatable > 0.8, \"MORE_SMALLER_NODES\"),\n    if(p95_cpu_requests\
          \ < 0.4 * p95_cpu_allocatable, \"SCALE_DOWN\"),\n    \"NOMINAL\"\n  )\n\
          | sort p95_cpu_allocatable desc\n| summarize by:{finding}, {count_clusters_with_finding=count(),\
          \ total_nodes=sum(avg_node_count), total_mcores=sum(p95_cpu_allocatable),\
          \ examples=collectArray(\n  record(\n    k8s.cluster.name, finding, avg_node_count=round(avg_node_count),\
          \ p95_cpu_allocatable=round(p95_cpu_allocatable), \n    p95_cpu_usage=round(p95_cpu_usage),\
          \ p95_cpu_limits=round(p95_cpu_limits), p95_cpu_requests=round(p95_cpu_requests),\n\
          \    cloudType, instanceType )\n, maxLength:5)}"
