    js_trigger_execution_plan:
      name: js_trigger_execution_plan
      input:
        script: "//script to use DQL results to feed API calls\n        import { execution\
          \ } from \"@dynatrace-sdk/automation-utils\";\n        import { extensions_2_0Client\
          \ } from \"@dynatrace-sdk/client-classic-environment-v2\";\n\n        export\
          \ default async function ({ executionId }) {\n          const ex = await\
          \ execution(executionId);\n          const result = await ex.result(\"fetch_from_db_monitoring\"\
          );\n          const records = result.records;\n          const fetch_results\
          \ = [];\n          const endpointCounter = {};\n          for (const query\
          \ of records) {\n            const endpoint = query[\"endpoint\"];\n   \
          \         const body = {\n              actions: {\n                executionPlans:\
          \ [\n                  {\n                    vendor: query.vendor?.toUpperCase()\
          \ ?? \"\",\n                    params: {\n                      sql_id:\
          \ query.sql_id,\n                      instance_name: query[\"instance.name\"\
          ],\n                      query: query.content,\n                    },\n\
          \                    endpointInfo: {\n                      hints: query[\"\
          dt.extension.endpoint.hints\"],\n                      shortUrl: endpoint,\n\
          \                    },\n                  },\n                ],\n    \
          \          },\n            };\n\n            try {\n              console.log(\"\
          Triggering fetch...\",{body: JSON.stringify(body,null,2)})\n           \
          \   const fetch_res =\n                await extensions_2_0Client.executeExtensionMonitoringConfigurationActions(\n\
          \                  {\n                    extensionName: query[\"dt.extension.name\"\
          ],\n                    configurationId: query[\"dt.extension.config.id\"\
          ],\n                    body: body,\n                  }\n             \
          \   );\n              fetch_results.push(fetch_res);\n            } catch\
          \ (error) {\n              console.warn(error, { body: JSON.stringify(body,\
          \ null, 2) });\n            }\n          }\n\n          return { records,\
          \ fetch_results };\n        }\n"
      action: dynatrace.automations:run-javascript
      position:
        x: 1
        y: 5
      conditions:
        custom: '{{result("fetch_from_db_monitoring")["records"][0]["execution_plan"]
          == None}}'
        states:
          js_emit_db_monitoring_found: OK
      description: If execution_plan is null, trigger EF to fetch it.
      predecessors:
      - js_emit_db_monitoring_found
    js_emit_fetching_exec_plan:
      name: js_emit_fetching_exec_plan
      input:
        script: "import { execution, result, getTaskExecutionLink } from '@dynatrace-sdk/automation-utils';\n\
          import { eventsClient } from '@dynatrace-sdk/client-classic-environment-v2';\n\
          \nexport default async function ({ executionId }) {\n  const ex = await\
          \ execution(executionId);\n  const trigger = ex.params?.event != undefined\
          \ ? ex.params.event : {};\n  const fetch_spans = await result('fetch_spans');\n\
          \  const fetch_from_db_monitoring = await result('fetch_from_db_monitoring');\n\
          \n  const serviceName = trigger['dt.entity.service.name'];\n  const sourceEntity\
          \ = trigger['dt.source_entity'];\n  const queryThreshold_ms = ex.input?.['queryThreshold_ms']\
          \ ?? ' '\n  const correlationId = trigger['dt.event.correlation_id'] ??\
          \ undefined;\n\n  const maxDuration = fetch_spans.records[0].maxDuration\
          \ ? fetch_spans.records[0].maxDuration/1000000 : ' ';\n  const spanName\
          \ = fetch_spans.records[0]['span.name'] ?? ' ';\n  const dbSystem = fetch_spans.records[0]['db.system']\
          \ ?? ' ';\n  const serverAddress = fetch_spans.records[0]['server.address']\
          \ ?? ' ';\n  const serverPort = fetch_spans.records[0]['server.port'] ??\
          \ ' ';\n  const dbNamespace = fetch_spans.records[0]['db.namespace'] ??\
          \ ' ';\n  const dbQueryText = fetch_spans.records[0]['db.query.text'] ??\
          \ ' ';\n\n  const dbSourceId = fetch_from_db_monitoring.records[0]['source_id']\
          \ ?? ' ';\n  const dbSourceEntity = fetch_from_db_monitoring.records[0]['dt.source_entity']\
          \ ?? ' ';\n  const dbContent = fetch_from_db_monitoring.records[0]['content']\
          \ ?? ' ';\n  const dbExecutionPlan = fetch_from_db_monitoring.records[0]['execution_plan']\
          \ ?? ' ';\n  const dbDevice = fetch_from_db_monitoring.records[0]['device']\
          \ ?? ' ';\n\n  const workflow = getTaskExecutionLink();\n  const environmentUrl\
          \ = workflow.replace(/(https:\\/\\/[^/]+)\\/.*/,\"$1\");\n\n  const newEvent\
          \ = {\n    eventType: 'PERFORMANCE_EVENT',\n    title: `Fetching execution\
          \ plan`,\n    timeout: 2,\n    properties: {\n      'event.description':\
          \ `Execution plan was not cached. Fetching now. Check in the Databases app\
          \ in ~2 minutes.`\n        + `\\n\\nMonitored database: [${serverAddress}:${serverPort}/${dbNamespace}](${environmentUrl}/ui/apps/dynatrace.database.overview/explorer?perspective=health&sort=healthIndicators%3Adescending&detailsId=${dbSourceId}&sidebarOpen=false&detailsTab=Statement+performance)`\n\
          \        + `\\n\\nQuery: \\n\\`\\`\\`\\n${dbQueryText}\\n\\`\\`\\``,\n \
          \     'dt.event.correlation_tag': correlationId,\n      //This must be the\
          \ original SERVICE entity to link\n      'dt.source_entity': sourceEntity,\n\
          \      'dt.entity.service': sourceEntity,\n      //TODO: get entity type\
          \ first\n      'dt.entity.sql:postgres_instance': dbSourceId,\n      'workflow':\
          \ workflow,\n      'remediation_step': 'Execution Plan Linking',\n    },\n\
          \  };\n\n  console.log(\"js_emit_fetching_exec_plan:\",{newEvent, serviceName,\
          \ sourceEntity, correlationId, dbSourceEntity, dbExecutionPlan })\n  return\
          \ await eventsClient.createEvent({ body: newEvent });\n}\n"
      action: dynatrace.automations:run-javascript
      position:
        x: 1
        y: 6
      conditions:
        states:
          js_trigger_execution_plan: OK
      description: Let the user know we're fetching the plan now.
      predecessors:
      - js_trigger_execution_plan
    js_emit_db_monitoring_found:
      name: js_emit_db_monitoring_found
      input:
        script: "import { execution, result, getTaskExecutionLink } from '@dynatrace-sdk/automation-utils';\n\
          import { eventsClient } from '@dynatrace-sdk/client-classic-environment-v2';\n\
          \nexport default async function ({ executionId }) {\n  const ex = await\
          \ execution(executionId);\n  const trigger = ex.params?.event != undefined\
          \ ? ex.params.event : {};\n  const fetch_spans = await result('fetch_spans');\n\
          \  const fetch_from_db_monitoring = await result('fetch_from_db_monitoring');\n\
          \n  const serviceName = trigger['dt.entity.service.name'];\n  const sourceEntity\
          \ = trigger['dt.source_entity'];\n  const queryThreshold_ms = ex.input?.['queryThreshold_ms']\
          \ ?? ' '\n  const correlationId = trigger['dt.event.correlation_id'] ??\
          \ undefined;\n\n  const maxDuration = fetch_spans.records[0].maxDuration\
          \ ? fetch_spans.records[0].maxDuration/1000000 : ' ';\n  const spanName\
          \ = fetch_spans.records[0]['span.name'] ?? ' ';\n  const dbSystem = fetch_spans.records[0]['db.system']\
          \ ?? ' ';\n  const serverAddress = fetch_spans.records[0]['server.address']\
          \ ?? ' ';\n  const serverPort = fetch_spans.records[0]['server.port'] ??\
          \ ' ';\n  const dbNamespace = fetch_spans.records[0]['db.namespace'] ??\
          \ ' ';\n  const dbQueryText = fetch_spans.records[0]['db.query.text'] ??\
          \ ' ';\n\n  const dbSourceId = fetch_from_db_monitoring.records[0]['source_id']\
          \ ?? ' ';\n  const dbSourceEntity = fetch_from_db_monitoring.records[0]['dt.source_entity']\
          \ ?? ' ';\n  const dbContent = fetch_from_db_monitoring.records[0]['content']\
          \ ?? ' ';\n  const dbExecutionPlan = fetch_from_db_monitoring.records[0]['execution_plan']\
          \ ?? ' ';\n  const dbDevice = fetch_from_db_monitoring.records[0]['device']\
          \ ?? ' ';\n  const dbQueryId = fetch_from_db_monitoring.records[0]['sql_id']\
          \ ?? ' ';\n  const dbDatabase = fetch_from_db_monitoring.records[0]['database']\
          \ ?? ' ';\n\n  const workflow = getTaskExecutionLink();\n  const environmentUrl\
          \ = workflow.replace(/(https:\\/\\/[^/]+)\\/.*/,\"$1\");\n\n  const query\
          \ = `fetch logs \n    | filter matchesValue(dt.source_entity, \"${dbSourceId}\"\
          )\n      AND matchesValue(queryid, \"${dbQueryId}\")\n      AND matchesValue(database,\
          \ \"${dbDatabase}\")\n      AND isNotNull(calls)\n      AND isNotNull(max_exec_time)\n\
          \      AND isNotNull(mean_exec_time)\n      AND isNotNull(total_exec_time)`\n\
          \  +\"| makeTimeseries {`Calls`=avg(toDouble(calls)), `Maximum execution\
          \ time`=avg(toDouble(max_exec_time)), `Mean execution time`=avg(toDouble(mean_exec_time)),\
          \ `Total execution time`=max(toDouble(total_exec_time))}, interval: 5m\"\
          \n  +\"| fieldsAdd `Number of calls delta` = arrayDelta(`Calls`), `Total\
          \ execution time delta` = arrayDelta(`Total execution time`)\"\n  +\"| fieldsAdd\
          \ `Mean execution time delta` = `Total execution time delta`[] / `Number\
          \ of calls delta`[]\"\n  +\"| fieldsRemove `Total execution time`, `Calls`,\
          \ `Number of calls delta`, `Mean execution time`\";\n  const tsquery = `timeseries\
          \ \\`Service\\`=max(dt.service.request.response_time), filter: dt.entity.service\
          \ == \"${sourceEntity}\" | append [${query}]`;\n\n  const newEvent = {\n\
          \    eventType: 'PERFORMANCE_EVENT',\n    title: `Database slowdown (database\
          \ context)`,\n    timeout: 2,\n    properties: {\n      'event.description':\
          \ `Possible match for query in database monitoring.`\n        + `\\n\\nMonitored\
          \ database: [${serverAddress}:${serverPort}/${dbNamespace}](${environmentUrl}/ui/apps/dynatrace.database.overview/explorer?perspective=health&sort=healthIndicators%3Adescending&detailsId=${dbSourceId}&sidebarOpen=false&detailsTab=Statement+performance)`\n\
          \        + `\\n\\nQuery: \\n\\`\\`\\`\\n${dbQueryText}\\n\\`\\`\\``,\n \
          \     'dt.event.correlation_tag': correlationId,\n      //This must be the\
          \ original SERVICE entity to link\n      'dt.source_entity': sourceEntity,\n\
          \      'dt.entity.service': sourceEntity,\n      //TODO: get entity type\
          \ first\n      'dt.entity.sql:postgres_instance': dbSourceId,\n      'query_string':\
          \ tsquery,\n      'workflow': workflow,\n      'remediation_step': 'Span-Database\
          \ Linking',\n    },\n  };\n\n  console.log(\"emit_db_root_cause:\",{newEvent,\
          \ environmentUrl })\n  return await eventsClient.createEvent({ body: newEvent\
          \ });\n}\n"
      action: dynatrace.automations:run-javascript
      position:
        x: 0
        y: 4
      conditions:
        custom: '{{result("fetch_from_db_monitoring")["records"]|length > 0}}'
        states:
          fetch_from_db_monitoring: OK
      description: If fetch_from_db_monitoring returns a result, then emit an event
        to link the database monitoring
      predecessors:
      - fetch_from_db_monitoring
