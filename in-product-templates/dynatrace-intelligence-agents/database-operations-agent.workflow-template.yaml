    js_emit_db_monitoring_not_found:
      name: js_emit_db_monitoring_not_found
      input:
        script: "import { execution, result, getTaskExecutionLink } from '@dynatrace-sdk/automation-utils';\n\
          import { eventsClient } from '@dynatrace-sdk/client-classic-environment-v2';\n\
          // import { getEnvironmentUrl } from '@dynatrace-sdk/platform/app-environment';\
          \ //not allowed\n\nexport default async function ({ executionId }) {\n \
          \ const ex = await execution(executionId);\n  const trigger = ex.params?.event\
          \ != undefined ? ex.params.event : {};\n  const fetch_spans = await result('fetch_spans');\n\
          \n  const serviceName = trigger['dt.entity.service.name'];\n  const sourceEntity\
          \ = trigger['dt.source_entity'];\n  const queryThreshold_ms = ex.input?.['queryThreshold_ms']\
          \ ?? ' '\n\n  const maxDuration = fetch_spans.records[0].maxDuration ? fetch_spans.records[0].maxDuration/1000000\
          \ : ' ';\n  const correlationId = trigger['dt.event.correlation_id'] ??\
          \ undefined;\n  const spanName = fetch_spans.records[0]['span.name'] ??\
          \ ' ';\n  const dbSystem = fetch_spans.records[0]['db.system'] ?? ' ';\n\
          \  const serverAddress = fetch_spans.records[0]['server.address'] ?? ' ';\n\
          \  const serverPort = fetch_spans.records[0]['server.port'] ?? ' ';\n  const\
          \ dbNamespace = fetch_spans.records[0]['db.namespace'] ?? ' ';\n  const\
          \ dbQueryText = fetch_spans.records[0]['db.query.text'] ?? ' ';\n\n  const\
          \ query = `fetch spans | filter matchesValue(dt.entity.service, \"${sourceEntity}\"\
          ) and span.kind == \"client\" and code.function == \"query\" | filter span.name\
          \ == \"${spanName}\" and db.system == \"${dbSystem}\" | maketimeseries by:\
          \ { span.name, db.system  }, {maxDuration=max(duration)}`;\n\n  const workflow\
          \ = getTaskExecutionLink();\n  // Get the current environment URL\n  const\
          \ environmentUrl = workflow.replace(/(https:\\/\\/[^/]+)\\/.*/,\"$1\");\n\
          \n  const newEvent = {\n    eventType: 'WARNING',\n    title: `Database\
          \ not monitored`,\n    timeout: 0,\n    properties: {\n      'event.description':\
          \ `Unable to match span data with database monitoring. Likely database monitoring\
          \ is not setup.`\n        + `\\n\\nDatabase: ${serverAddress}:${serverPort}/${dbNamespace}`\n\
          \        + `\\n\\nClick [here](${environmentUrl}/ui/apps/dynatrace.database.overview)\
          \ to go to the Databases app to setup database monitoring.`,\n      'dt.event.correlation_tag':\
          \ correlationId,\n      // 'dt.query': query,\n      'chart.query': query,\n\
          \      'dt.source_entity': sourceEntity,\n      'dt.entity.service': sourceEntity,\n\
          \      'workflow': workflow,\n      'remediation_step': 'Span-Database Linking',\n\
          \    },\n  };\n\n  console.log(\"emit_db_root_cause:\",{newEvent, serviceName,\
          \ sourceEntity, correlationId, query, maxDuration })\n  return await eventsClient.createEvent({\
          \ body: newEvent });\n}\n"
      action: dynatrace.automations:run-javascript
      position:
        x: 1
        y: 4
      conditions:
        custom: '{{result("fetch_from_db_monitoring")["records"]|length == 0}}'
        states:
          fetch_from_db_monitoring: OK
      description: If fetch_from_db_monitoring does not return a result, then emit
        an event asking user to enable monitoring
      predecessors:
