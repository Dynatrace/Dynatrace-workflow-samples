metadata:
  version: '1'
  dependencies:
    apps:
    - id: dynatrace.automations
      version: ^1.2879.1
    - id: dynatrace.davis.workflow.actions
      version: ^1.8.0
    - id: dynatrace.davis.copilot.workflow.actions
      version: ^1.3.2-preview.0.1
    - id: dynatrace.servicenow
      version: ^2.3.0
    - id: dynatrace.github.connector
      version: ^2.8.0
    - id: dynatrace.msteams
      version: ^0.3.13
  inputs:
  - type: connection
    schema: app:dynatrace.servicenow:connection
    targets:
    - tasks.create_snow_change_request.connectionId
  - type: connection
    schema: app:dynatrace.github.connector:connection
    targets:
    - tasks.read_deployment_configs.connectionId
    - tasks.create_scaling_pr.connectionId
    - tasks.open_scaling_pr.connectionId
  - type: connection
    schema: app:dynatrace.msteams:connection
    targets:
    - tasks.send_capacity_report.connectionId
workflow:
  title: Proactive Capacity Optimization Agent
  description: Schedule-driven proactive capacity management — forecasts resource
    utilization using Dynatrace Intelligence predictive analytics, identifies services
    approaching saturation, proposes scaling changes as a GitOps pull request, and
    creates a ServiceNow change request for approval.
  schemaVersion: 4
  trigger:
    schedule:
      isActive: true
      trigger:
        cron: 0 8 * * MON
        type: cron
      filterParameters:
        earliestStart: '2026-04-06'
      timezone: UTC
      inputs: {}
  result: null
  type: STANDARD
  input: {}
  hourlyExecutionLimit: 10
  guide: '# Proactive Capacity Optimization Agent


    This workflow runs on a weekly schedule and proactively identifies services that
    will need scaling **before** problems occur. It combines historical resource data
    with Dynatrace Intelligence predictive forecasting to anticipate capacity needs
    7 days ahead.


    **What makes this autonomous**: No human trigger needed. The workflow runs every
    Monday, forecasts resource trends, generates scaling recommendations, opens a pull
    request on your GitOps repository, and creates a ServiceNow change request — all
    hands-off.


    **Approval is modeled as a dual gate**: the ServiceNow change request provides
    ITSM governance, while the GitHub pull request enables code review before scaling
    changes are applied.


    # Setup


    This workflow requires connections to ServiceNow, GitHub, and Microsoft Teams.


    **ServiceNow connection**: Go to **Settings** > **Connections** > [ServiceNow](/ui/apps/dynatrace.settings/settings/dynatrace.servicenow)
    > **+ Connection**, provide your ServiceNow instance details, and click **Create**.
    For details, see [ServiceNow documentation](https://dt-url.net/it03naf).


    **GitHub connection**: Go to **Settings** > **Connections** > [GitHub](/ui/apps/dynatrace.settings/settings/dynatrace.github.connector)
    > **+ Connection**. For details, see [Set up GitHub integration](https://dt-url.net/sz02zyb).


    **Microsoft Teams connection**: Go to **Settings** > **Connections** > [Microsoft
    Teams](/ui/apps/dynatrace.settings/settings/dynatrace.msteams) > **+ Connection**.


    # Trigger


    This workflow uses a schedule [trigger](?trigger=) set to run every Monday at 08:00
    UTC. Adjust the cron expression and timezone to match your operations cadence.
    You can also trigger it manually on demand.


    # Data collection (parallel)


    Tasks [query_resource_utilization](?task=query_resource_utilization&tab=input)
    and [query_scaling_events](?task=query_scaling_events&tab=input) run in parallel
    to gather 7-day resource utilization trends and recent saturation alerts.


    # Predictive forecasting


    Task [forecast_resource_usage](?task=forecast_resource_usage&tab=input) uses the
    Dynatrace Intelligence **GenericForecastAnalyzer** to predict CPU utilization 7
    days ahead with 90% confidence intervals. This is the key differentiator — scaling
    decisions are based on predicted future state, not just current utilization.


    Customize the `timeSeriesData` field to forecast different metrics (memory, disk,
    network) or scope to specific hosts/services.


    # AI-powered analysis


    Task [analyze_capacity](?task=analyze_capacity&tab=input) combines the historical
    data with forecast predictions and uses Dynatrace Intelligence to identify which
    services need scaling, recommend specific resource adjustments, and prioritize
    changes by risk.


    # GitOps pull request


    Tasks [read_deployment_configs](?task=read_deployment_configs&tab=input) and [prepare_scaling_changes](?task=prepare_scaling_changes&tab=input)
    read the current Kubernetes deployment manifests and generate updated resource
    limits/requests. Task [create_scaling_pr](?task=create_scaling_pr&tab=input) commits
    the changes to a feature branch and opens a pull request.


    Configure the **owner**, **repository**, and **filePath** fields to point to your
    GitOps repository.


    # ServiceNow change request


    Task [create_snow_change_request](?task=create_snow_change_request&tab=input) creates
    a change request with the capacity analysis, forecast data, and pull request reference.
    This serves as the ITSM approval gate.


    # Weekly report


    Task [send_capacity_report](?task=send_capacity_report&tab=input) sends an Adaptive
    Card summary to Microsoft Teams with the capacity forecast, recommended changes,
    and links to the PR and change request.'
  tasks:
    query_resource_utilization:
      name: query_resource_utilization
      input:
        query: |-
          timeseries cpu_avg = avg(dt.host.cpu.usage),
                    mem_avg = avg(dt.host.memory.usage),
                    by: { dt.entity.host },
                    from: now()-7d, to: now(),
                    interval: 1h
          | fieldsAdd host_name = entityName(dt.entity.host)
          | sort arrayAvg(cpu_avg) desc
          | limit 20
      action: dynatrace.automations:execute-dql-query
      position:
        x: -1
        y: 1
      description: Query 7-day CPU and memory utilization trends for top hosts
      predecessors: []
    query_scaling_events:
      name: query_scaling_events
      input:
        query: |-
          fetch dt.davis.events, from:-7d
          | filter event.category == "RESOURCE"
              or event.category == "CUSTOM_ALERT"
          | filter matchesPhrase(event.name, "CPU")
              or matchesPhrase(event.name, "memory")
              or matchesPhrase(event.name, "saturation")
          | summarize alert_count = count(),
                      last_seen = last(timestamp),
                      by: { dt.source_entity, event.name, event.category }
          | sort alert_count desc
          | limit 30
      action: dynatrace.automations:execute-dql-query
      position:
        x: 1
        y: 1
      description: Query recent resource saturation alerts and scaling events
      predecessors: []
    forecast_resource_usage:
      name: forecast_resource_usage
      input:
        body:
          nPaths: 200
          useModelCache: true
          forecastOffset: 0
          timeSeriesData: timeseries usage=avg(dt.host.cpu.usage), by:{ dt.entity.host
            }, from:now()-7d, interval:1h
          forecastHorizon: 168
          generalParameters:
            timeframe:
              endTime: now
              startTime: now-7d
            logVerbosity: WARNING
            resolveDimensionalQueryData: false
          coverageProbability: 0.9
          applyZeroLowerBoundHeuristic: true
        analyzerName: dt.statistics.GenericForecastAnalyzer
      action: dynatrace.davis.workflow.actions:davis-analyze
      position:
        x: 0
        y: 2
      conditions:
        states:
          query_resource_utilization: OK
      description: Forecast CPU utilization 7 days ahead using Dynatrace Intelligence
        predictive analytics
      predecessors:
      - query_resource_utilization
    analyze_capacity:
      name: analyze_capacity
      input:
        config: disabled
        prompt: |-
          You are a capacity planning agent. Analyze the following data sources and provide
          actionable scaling recommendations.

          HISTORICAL RESOURCE UTILIZATION (7 days, host-level):
          {{ result('query_resource_utilization') }}

          RECENT RESOURCE ALERTS:
          {{ result('query_scaling_events') }}

          FORECASTED CPU USAGE (next 7 days, 90% confidence, host-level):
          {{ result('forecast_resource_usage') }}

          Provide your response in this structure:
          1. EXECUTIVE SUMMARY: One paragraph overview of capacity health
          2. AT-RISK HOSTS: List hosts predicted to exceed 80% CPU utilization within 7 days
          3. SCALING RECOMMENDATIONS: For each at-risk host, specify:
             - Current observed resource utilization (CPU/memory)
             - Recommended new resource limits
             - Justification (trend + forecast data)
          4. PRIORITY: Rank recommendations by urgency (Critical/High/Medium/Low)
          5. RESOURCE CHANGES: Exact Kubernetes resource spec changes in YAML format:
             resources:
               requests:
                 cpu: "<new_value>"
                 memory: "<new_value>"
               limits:
                 cpu: "<new_value>"
                 memory: "<new_value>"
        autoTrim: true
        supplementary: ''
      action: dynatrace.davis.copilot.workflow.actions:davis-copilot
      position:
        x: 0
        y: 3
      conditions:
        states:
          query_resource_utilization: OK
          query_scaling_events: OK
          forecast_resource_usage: OK
      description: Dynatrace Intelligence combines historical data with forecast to
        recommend scaling actions
      predecessors:
      - query_resource_utilization
      - query_scaling_events
      - forecast_resource_usage
    read_deployment_configs:
      name: read_deployment_configs
      input:
        owner: ''
        filePath: deploy/deployment.yaml
        reference: main
        repository: ''
        connectionId: ''
      action: dynatrace.github.connector:get-content
      position:
        x: 0
        y: 4
      conditions:
        states:
          analyze_capacity: OK
      description: Read current Kubernetes deployment manifests from GitOps repository
      predecessors:
      - analyze_capacity
    prepare_scaling_changes:
      name: prepare_scaling_changes
      input:
        script: |-
          import { execution } from '@dynatrace-sdk/automation-utils';

          export default async function ({ execution_id }) {
            const ex = await execution(execution_id);
            const aiResult = await ex.result('analyze_capacity');
            const currentConfig = await ex.result('read_deployment_configs');

            const analysis = aiResult['text'];
            const configContent = currentConfig['content'];

            // Extract resource changes section from AI response
            const changesMatch = analysis.match(/RESOURCE CHANGES:\s*([\s\S]*?)$/i);
            const recommendedChanges = changesMatch ? changesMatch[1].trim() : '';

            // Extract executive summary for the change request
            const summaryMatch = analysis.match(/EXECUTIVE SUMMARY:\s*([\s\S]*?)(?=\n\d\.|$)/i);
            const executiveSummary = summaryMatch ? summaryMatch[1].trim() : 'Proactive capacity optimization based on forecast analysis.';

            // Extract at-risk hosts
            const atRiskMatch = analysis.match(/AT-RISK HOSTS:\s*([\s\S]*?)(?=\n\d\.|$)/i);
            const atRiskHosts = atRiskMatch ? atRiskMatch[1].trim() : '';

            // Apply AI-recommended resource changes to the deployment config
            let updatedConfig = configContent;
            if (recommendedChanges) {
              // Extract the resources block from the AI output and replace in the deployment YAML
              const aiResourcesMatch = recommendedChanges.match(/resources:[\s\S]*/m);
              if (aiResourcesMatch) {
                const newResourcesYaml = aiResourcesMatch[0].trim();
                // Replace existing resources block, preserving indentation
                const replaced = configContent.replace(
                  /([ \t]+)(resources:(?:\n(?:\2[ \t]+)[^\n]*)*)/m,
                  (match, indent) => indent + newResourcesYaml.replace(/\n/g, '\n' + indent)
                );
                updatedConfig = replaced !== configContent ? replaced
                  : configContent + '\n# AI Recommended Resource Changes:\n' + recommendedChanges;
              } else {
                updatedConfig = configContent + '\n# AI Recommended Resource Changes:\n' + recommendedChanges;
              }
            }

            const weekDate = new Date().toISOString().split('T')[0];

            return {
              updatedConfig: updatedConfig,
              recommendedChanges: recommendedChanges,
              executiveSummary: executiveSummary,
              atRiskHosts: atRiskHosts,
              fullAnalysis: analysis,
              weekDate: weekDate,
              commitMessage: `chore: proactive capacity scaling ${weekDate}`
            };
          }
      action: dynatrace.automations:run-javascript
      position:
        x: 0
        y: 5
      conditions:
        states:
          read_deployment_configs: OK
      description: Parse AI recommendations into deployment config changes
      predecessors:
      - read_deployment_configs
    create_scaling_pr:
      name: create_scaling_pr
      input:
        owner: ''
        branch: capacity/scaling-{{ execution().id }}
        filePath: deploy/deployment.yaml
        repository: ''
        fileContent: '{{ result("prepare_scaling_changes")["updatedConfig"] }}'
        connectionId: ''
        sourceBranch: main
        commitMessage: '{{ result("prepare_scaling_changes")["commitMessage"] }}'
        createNewBranch: true
      action: dynatrace.github.connector:create-or-replace-file
      position:
        x: 0
        y: 6
      conditions:
        custom: '{{ result("prepare_scaling_changes")["atRiskHosts"] | length > 0 }}'
        states:
          prepare_scaling_changes: OK
      description: Commit resource limit updates to a feature branch on the GitOps repository
      predecessors:
      - prepare_scaling_changes
    open_scaling_pr:
      name: open_scaling_pr
      input:
        owner: ''
        repository: ''
        head: capacity/scaling-{{ execution().id }}
        base: main
        title: '[Capacity] Proactive scaling changes — {{ result("prepare_scaling_changes")["weekDate"]
          }}'
        body: "{{ result('prepare_scaling_changes')['executiveSummary'] }}\n\nAt-Risk\
          \ Hosts:\n{{ result('prepare_scaling_changes')['atRiskHosts'] }}\n\nForecast\
          \ Horizon: 7 days (90% confidence)\nRecommended Changes:\n{{ result('prepare_scaling_changes')['recommendedChanges']\
          \ }}\n\nWorkflow Execution: {{ execution().link }}"
        connectionId: ''
      action: dynatrace.github.connector:create-pull-request
      position:
        x: 0
        y: 7
      conditions:
        states:
          create_scaling_pr: OK
      description: Open a pull request for the scaling changes on the GitOps repository
      predecessors:
      - create_scaling_pr
    create_snow_change_request:
      name: create_snow_change_request
      input:
        fields:
        - id: a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6
          key: short_description
          value: '[Proactive Capacity] Weekly scaling optimization — {{ result("prepare_scaling_changes")["weekDate"]
            }}'
        - id: b2c3d4e5-f6a7-8b9c-0d1e-f2a3b4c5d6e7
          key: description
          value: "Proactive capacity optimization generated by Dynatrace Intelligence\
            \ predictive analytics.\n\nExecutive Summary:\n{{ result('prepare_scaling_changes')['executiveSummary']\
            \ }}\n\nAt-Risk Hosts:\n{{ result('prepare_scaling_changes')['atRiskHosts']\
            \ }}\n\nForecast Horizon: 7 days (90% confidence)\nRecommended Changes:\n\
            {{ result('prepare_scaling_changes')['recommendedChanges'] }}\n\nPull\
            \ Request: {{ result('open_scaling_pr')['url'] | default('N/A') }}\nWorkflow\
            \ Execution: {{ execution().link }}"
        - id: c3d4e5f6-a7b8-9c0d-1e2f-a3b4c5d6e7f8
          key: category
          value: Software
        - id: d4e5f6a7-b8c9-0d1e-2f3a-b4c5d6e7f8a9
          key: impact
          value: '3'
        - id: e5f6a7b8-c9d0-1e2f-3a4b-c5d6e7f8a9b0
          key: risk
          value: Low
        - id: f6a7b8c9-d0e1-2f3a-4b5c-d6e7f8a9b0c1
          key: correlation_id
          value: DT_CAPACITY_{{ result("prepare_scaling_changes")["weekDate"] }}
        tableName: change_request
        connectionId: ''
      action: dynatrace.servicenow:snow-create-record
      position:
        x: 0
        y: 8
      conditions:
        states:
          open_scaling_pr: OK
      description: Create ServiceNow change request with capacity analysis and forecast
        data
      predecessors:
      - open_scaling_pr
    send_capacity_report:
      name: send_capacity_report
      input:
        message: "{\n  \"type\": \"AdaptiveCard\",\n  \"$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\"\
          ,\n  \"version\": \"1.4\",\n  \"body\": [\n    {\n      \"type\": \"TextBlock\"\
          ,\n      \"size\": \"Medium\",\n      \"weight\": \"Bolder\",\n      \"\
          text\": \"\U0001F4CA Weekly Capacity Forecast Report\"\n    },\n    {\n \
          \     \"type\": \"TextBlock\",\n      \"text\": {{ result('prepare_scaling_changes')['executiveSummary']\
          \ | truncate(500) | to_json }},\n      \"wrap\": true\n    },\n    {\n  \
          \    \"type\": \"FactSet\",\n      \"facts\": [\n        {\n          \"\
          title\": \"Forecast Horizon\",\n          \"value\": \"7 days (90% confidence)\"\
          \n        },\n        {\n          \"title\": \"Pull Request\",\n        \
          \  \"value\": \"{{ result('open_scaling_pr')['number'] | default('pending')\
          \ }}\"\n        },\n        {\n          \"title\": \"Change Request\",\n\
          \          \"value\": \"{{ result('create_snow_change_request')['number']\
          \ | default('pending') }}\"\n        },\n        {\n          \"title\":\
          \ \"Status\",\n          \"value\": \"Awaiting dual approval (ServiceNow\
          \ CR + GitHub PR)\"\n        }\n      ]\n    },\n    {\n      \"type\": \"\
          TextBlock\",\n      \"text\": \"At-Risk Hosts:\",\n      \"weight\": \"Bolder\"\
          ,\n      \"spacing\": \"Medium\"\n    },\n    {\n      \"type\": \"TextBlock\"\
          ,\n      \"text\": {{ result('prepare_scaling_changes')['atRiskHosts'] |\
          \ truncate(800) | to_json }},\n      \"wrap\": true,\n      \"fontType\"\
          : \"Monospace\",\n      \"size\": \"Small\"\n    },\n    {\n      \"type\"\
          : \"ActionSet\",\n      \"actions\": [\n        {\n          \"type\": \"\
          Action.OpenUrl\",\n          \"title\": \"View Pull Request\",\n        \
          \  \"url\": \"{{ result('open_scaling_pr')['url'] | default('#') }}\"\n \
          \       },\n        {\n          \"type\": \"Action.OpenUrl\",\n        \
          \  \"title\": \"View Change Request\",\n          \"url\": \"{{ result('create_snow_change_request')['url']\
          \ | default('#') }}\"\n        },\n        {\n          \"type\": \"Action.OpenUrl\"\
          ,\n          \"title\": \"View Workflow Execution\",\n          \"url\":\
          \ \"{{ execution().link }}\"\n        }\n      ]\n    }\n  ]\n}"
        connectionId: ''
      action: dynatrace.msteams:send-message
      position:
        x: 0
        y: 9
      conditions:
        states:
          create_snow_change_request: OK
      description: Send weekly capacity forecast report to Microsoft Teams
      predecessors:
      - create_snow_change_request
